<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Page introuvable — Avis Basé</title>
<meta name="description" content="Cette page n'existe pas (ou plus). Retour à la une d'Avis Basé."/>
<meta name="robots" content="noindex"/>
<link rel="icon" href="/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Manrope:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#F4EFE4; --ink:#15110B; --ink-muted:#5C5345; --accent:#B5773B; --rule:#D9CFB7;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#15110B; --ink:#FDFAF3; --ink-muted:#B9AE96; --accent:#E0A560; --rule:#33291A; }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Manrope',-apple-system,system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px;line-height:1.5;
  }
  .dateline{
    font-size:11px;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--ink-muted);margin-bottom:16px;
  }
  h1{
    font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:clamp(48px,12vw,128px);
    letter-spacing:-0.02em;line-height:0.9;text-align:center;
  }
  h1 em{font-style:italic;color:var(--accent);font-weight:400}
  .rule{width:80px;height:1px;background:var(--rule);margin:24px auto}
  p{max-width:520px;text-align:center;color:var(--ink-muted);font-size:15px;margin-bottom:8px}
  .actions{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;justify-content:center}
  a.btn{
    display:inline-block;padding:12px 24px;border-radius:999px;
    font-size:13px;font-weight:600;letter-spacing:0.4px;
    text-decoration:none;border:1px solid var(--ink);color:var(--ink);
    transition:transform .15s ease, background .15s ease;
  }
  a.btn:hover{transform:translateY(-1px)}
  a.btn--primary{background:var(--ink);color:var(--bg)}
  a.btn--ghost{background:transparent}
  .footer{
    position:absolute;bottom:24px;font-size:11px;color:var(--ink-muted);
    letter-spacing:1.2px;text-transform:uppercase;
  }
</style>
</head>
<body>
  <div class="dateline">N° de page · introuvable</div>
  <h1>4<em>0</em>4</h1>
  <div class="rule"></div>
  <p>Cette page n'a pas été vérifiée. Ou alors, elle n'existe simplement pas.</p>
  <p style="font-style:italic;color:var(--ink-muted)">Sur Avis Basé, on n'invente pas — on cite.</p>
  <div class="actions">
    <a class="btn btn--primary" href="/">Retour à la une</a>
    <a class="btn btn--ghost" href="https://www.tiktok.com/@avis_base.nth">Voir sur TikTok</a>
  </div>
  <div class="footer">Avis Basé · le média qui source tout</div>
</body>
</html>
